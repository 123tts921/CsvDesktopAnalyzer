<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSV 多列时间趋势比较</title>
<script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
<script>
if (typeof echarts === "undefined") {
  document.write('<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"><\/script>');
}
</script>
<style>
:root {
  --bg: #f4f6f8;
  --panel: #ffffff;
  --text: #1f2933;
  --muted: #667085;
  --border: #d9e2ec;
  --accent: #0f766e;
  --accent-soft: #e0f2ef;
  --danger: #b42318;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: "Microsoft YaHei UI", "Segoe UI", Arial, sans-serif;
}
.header {
  height: 56px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
}
.title { font-size: 18px; font-weight: 700; white-space: nowrap; }
.file-info { margin-left: auto; color: var(--muted); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.btn {
  border: 1px solid var(--border);
  background: #fff;
  color: var(--text);
  border-radius: 6px;
  padding: 7px 12px;
  cursor: pointer;
  font-size: 13px;
}
.btn:hover { background: #f0f4f8; }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.primary:hover { background: #0b5f59; }
.btn:disabled { opacity: .45; cursor: not-allowed; }
.main {
  display: grid;
  grid-template-columns: 340px 1fr;
  height: calc(100vh - 56px);
}
.side {
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.section { padding: 10px 12px; border-bottom: 1px solid var(--border); }
.section label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
input, select {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 8px;
  font: inherit;
  font-size: 13px;
  background: #fff;
}
input:focus, select:focus { outline: 2px solid rgba(15, 118, 110, .16); border-color: var(--accent); }
.row { display: flex; gap: 8px; align-items: center; }
.row > * { flex: 1; }
.actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.var-header {
  display: grid;
  grid-template-columns: 20px 1fr 70px;
  gap: 7px;
  align-items: center;
  padding: 7px 10px;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: #f8fafc;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
}
.var-list {
  flex: 1;
  overflow: auto;
  min-height: 0;
  border-bottom: 1px solid var(--border);
}
.var-list::-webkit-scrollbar {
  width: 10px;
}
.var-list::-webkit-scrollbar-thumb {
  background: #cbd5e1;
  border-radius: 10px;
  border: 2px solid #ffffff;
}
.var-list::-webkit-scrollbar-track {
  background: #f8fafc;
}
.var-item {
  display: grid;
  grid-template-columns: 20px 1fr 70px;
  gap: 7px;
  align-items: center;
  padding: 6px 10px;
  border-bottom: 1px solid #eef2f6;
  font-size: 13px;
}
.var-item:hover { background: #f7fafc; }
.var-item input { width: 16px; height: 16px; }
.var-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.var-item select { padding: 3px 4px; font-size: 12px; }
.axis-row { display: grid; grid-template-columns: 1fr 70px 70px; gap: 6px; align-items: center; margin-top: 6px; }
.axis-chip { display: inline-block; color: #fff; border-radius: 10px; padding: 2px 8px; font-size: 12px; }
.chart-wrap { position: relative; min-width: 0; }
#chart { width: 100%; height: 100%; }
.empty {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: var(--muted);
  pointer-events: none;
}
.loading {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,.82);
  z-index: 5;
  color: var(--text);
  font-weight: 600;
}
.loading.show { display: flex; }
.hint { color: var(--muted); font-size: 12px; line-height: 1.6; }
.warn { color: var(--danger); }
@media (max-width: 900px) {
  .main { grid-template-columns: 280px 1fr; }
  .title { font-size: 15px; }
}
</style>
</head>
<body>
<div class="header">
  <div class="title">CSV 多列时间趋势比较</div>
  <button class="btn primary" id="openBtn">加载 CSV</button>
  <input id="fileInput" type="file" accept=".csv,.txt" style="display:none">
  <button class="btn" id="drawBtn" disabled>绘制曲线</button>
  <button class="btn" id="saveBtn" disabled>保存图片</button>
  <div class="file-info" id="fileInfo">未加载数据</div>
</div>

<div class="main">
  <aside class="side">
    <div class="section">
      <div class="row">
        <div>
          <label>时间列</label>
          <select id="timeColumn" disabled></select>
        </div>
        <div>
          <label>图表类型</label>
          <select id="chartType" disabled>
            <option value="line" selected>折线图</option>
            <option value="line+points">点线图</option>
            <option value="scatter">散点图</option>
          </select>
        </div>
        <div>
          <label>抽样上限/列</label>
          <select id="sampleLimit">
            <option value="5000">5000</option>
            <option value="10000" selected>10000</option>
            <option value="20000">20000</option>
            <option value="0">不抽样</option>
          </select>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="row">
        <div>
          <label>开始时间</label>
          <input id="startTime" placeholder="2025-02-01 00:00" disabled>
        </div>
        <div>
          <label>结束时间</label>
          <input id="endTime" placeholder="2026-03-01 00:00" disabled>
        </div>
      </div>
    </div>

    <div class="section">
      <label>搜索指标</label>
      <input id="searchBox" placeholder="例如：电能、温度、压力" disabled>
    </div>

    <div class="section">
      <div class="actions">
        <button class="btn" id="selectVisible" disabled>全选可见</button>
        <button class="btn" id="invertVisible" disabled>反选可见</button>
        <button class="btn" id="clearAll" disabled>清空</button>
      </div>
    </div>

    <div class="var-header">
      <div>选</div>
      <div>指标列</div>
      <div>Y轴</div>
    </div>
    <div class="var-list" id="varList">
      <div class="section hint">请先加载 CSV 文件。</div>
    </div>

    <div class="section">
      <div class="row">
        <button class="btn" id="addAxis" disabled>增加 Y 轴</button>
        <button class="btn" id="removeAxis" disabled>减少 Y 轴</button>
      </div>
      <div id="axisSummary" class="hint" style="margin-top:8px">当前：Y1</div>
    </div>
  </aside>

  <main class="chart-wrap">
    <div id="chart"></div>
    <div class="empty" id="emptyState">加载 CSV 后，勾选左侧指标并点击“绘制曲线”。图表底部有可拖动时间轴。</div>
    <div class="loading" id="loading">处理中...</div>
  </main>
</div>

<script>
const axisColors = ["#1f77b4", "#ff7f0e", "#2ca02c", "#d62728", "#9467bd", "#8c564b"];
const curveColors = [
  "#1f77b4", "#ff7f0e", "#2ca02c", "#d62728", "#9467bd", "#8c564b",
  "#e377c2", "#7f7f7f", "#bcbd22", "#17becf", "#005f73", "#ae2012"
];

let table = null;
let variables = [];
let chart = null;
let axisCount = 1;

const el = id => document.getElementById(id);

function showLoading(text) {
  el("loading").textContent = text || "处理中...";
  el("loading").classList.add("show");
}

function hideLoading() {
  el("loading").classList.remove("show");
}

function setEnabled(enabled) {
  ["drawBtn", "saveBtn", "timeColumn", "chartType", "startTime", "endTime", "searchBox", "selectVisible", "invertVisible", "clearAll", "addAxis", "removeAxis"]
    .forEach(id => el(id).disabled = !enabled);
}

function parseCsv(text, delimiter) {
  const rows = [];
  let row = [];
  let cell = "";
  let quoted = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    const next = text[i + 1];
    if (quoted) {
      if (ch === '"' && next === '"') {
        cell += '"';
        i++;
      } else if (ch === '"') {
        quoted = false;
      } else {
        cell += ch;
      }
    } else if (ch === '"') {
      quoted = true;
    } else if (ch === delimiter) {
      row.push(cell);
      cell = "";
    } else if (ch === "\n") {
      row.push(cell);
      rows.push(row);
      row = [];
      cell = "";
    } else if (ch !== "\r") {
      cell += ch;
    }
  }
  if (cell.length || row.length) {
    row.push(cell);
    rows.push(row);
  }
  return rows.filter(r => r.some(c => String(c).trim() !== ""));
}

function detectDelimiter(text) {
  const sample = text.slice(0, 8192);
  const candidates = [",", "\t", ";"];
  let best = ",";
  let bestCount = -1;
  for (const d of candidates) {
    const count = sample.split(d).length - 1;
    if (count > bestCount) {
      best = d;
      bestCount = count;
    }
  }
  return best;
}

function decodeBuffer(buffer) {
  const encodings = ["utf-8", "utf-8-sig", "gb18030", "gbk", "utf-16le", "utf-16"];
  for (const enc of encodings) {
    try {
      const label = enc === "utf-8-sig" ? "utf-8" : enc;
      let text = new TextDecoder(label).decode(buffer);
      text = text.replace(/^\ufeff/, "");
      const firstLine = text.split(/\r?\n/).find(line => line.trim());
      if (firstLine && firstLine.includes(",")) return { text, encoding: enc };
      if (firstLine && firstLine.split(/\t|;/).length > 2) return { text, encoding: enc };
    } catch (_) {}
  }
  return { text: new TextDecoder("utf-8").decode(buffer).replace(/^\ufeff/, ""), encoding: "utf-8" };
}

function parseTime(value) {
  const raw = String(value || "").trim();
  if (!raw) return null;
  let s = raw.replace(/\//g, "-");
  if (/^\d{4}-\d{1,2}-\d{1,2}\s+\d{1,2}:\d{2}(:\d{2})?$/.test(s)) {
    s = s.replace(" ", "T");
  }
  const date = new Date(s);
  if (!Number.isNaN(date.getTime())) return date;

  const m = raw.match(/^(\d{4})[/-](\d{1,2})[/-](\d{1,2})(?:\s+(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?)?$/);
  if (!m) return null;
  return new Date(
    Number(m[1]),
    Number(m[2]) - 1,
    Number(m[3]),
    Number(m[4] || 0),
    Number(m[5] || 0),
    Number(m[6] || 0)
  );
}

function parseNumber(value) {
  const s = String(value || "").trim().replace(/,/g, "");
  if (!s) return NaN;
  const n = Number(s);
  return Number.isFinite(n) ? n : NaN;
}

function formatTime(date) {
  const pad = n => String(n).padStart(2, "0");
  return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

function findTimeColumn(headers) {
  let idx = headers.findIndex(h => h.trim() === "时间");
  if (idx >= 0) return idx;
  idx = headers.findIndex(h => /time|date|日期|时间/i.test(h));
  return idx >= 0 ? idx : 0;
}

async function loadFile(file) {
  showLoading("正在读取文件...");
  const buffer = await file.arrayBuffer();
  const { text, encoding } = decodeBuffer(buffer);
  const delimiter = detectDelimiter(text);
  showLoading("正在解析 CSV...");
  const rows = parseCsv(text, delimiter);
  if (rows.length < 2) throw new Error("CSV 行数不足。");

  const headers = rows[0].map(h => String(h).trim());
  const body = rows.slice(1);
  const timeIdx = findTimeColumn(headers);
  const times = [];
  const validRows = [];

  for (const row of body) {
    const time = parseTime(row[timeIdx]);
    if (!time) continue;
    times.push(time);
    validRows.push(row);
  }
  if (!times.length) throw new Error("没有识别到有效时间列。");

  table = { fileName: file.name, headers, rows: validRows, times, timeIdx, encoding, delimiter };
  el("timeColumn").innerHTML = headers.map((h, i) => `<option value="${i}" ${i === timeIdx ? "selected" : ""}>${escapeHtml(h)}</option>`).join("");
  buildVariables();
  setInitialTimeRange();
  setEnabled(true);
  el("fileInfo").textContent = `${file.name} | ${validRows.length.toLocaleString()} 行 | ${variables.length} 个指标 | ${encoding}`;
}

function buildVariables() {
  variables = [];
  const { headers, rows, timeIdx } = table;
  for (let i = 0; i < headers.length; i++) {
    if (i === timeIdx || !headers[i]) continue;
    let numericCount = 0;
    const limit = Math.min(rows.length, 500);
    for (let r = 0; r < limit; r++) {
      if (!Number.isNaN(parseNumber(rows[r][i]))) numericCount++;
    }
    if (numericCount > 0) {
      variables.push({ name: headers[i], idx: i, checked: false, axis: 0 });
    }
  }
  renderVariables();
}

function setInitialTimeRange() {
  el("startTime").value = formatTime(table.times[0]);
  el("endTime").value = formatTime(table.times[table.times.length - 1]);
}

function renderVariables() {
  const q = el("searchBox").value.trim().toLowerCase();
  const html = variables.map((v, index) => {
    if (q && !v.name.toLowerCase().includes(q)) return "";
    const axisOptions = Array.from({ length: axisCount }, (_, i) =>
      `<option value="${i}" ${v.axis === i ? "selected" : ""}>Y${i + 1}</option>`
    ).join("");
    return `
      <div class="var-item" data-index="${index}">
        <input type="checkbox" ${v.checked ? "checked" : ""} data-role="check">
        <div class="var-name" title="${escapeHtml(v.name)}">${escapeHtml(v.name)}</div>
        <select data-role="axis">${axisOptions}</select>
      </div>
    `;
  }).join("");
  el("varList").innerHTML = html || '<div class="section hint">没有匹配的指标。</div>';
  updateAxisSummary();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
}

function visibleVariableIndexes() {
  const q = el("searchBox").value.trim().toLowerCase();
  const indexes = [];
  variables.forEach((v, i) => {
    if (!q || v.name.toLowerCase().includes(q)) indexes.push(i);
  });
  return indexes;
}

function updateAxisSummary() {
  el("axisSummary").innerHTML = Array.from({ length: axisCount }, (_, i) =>
    `<span class="axis-chip" style="background:${axisColors[i]}">Y${i + 1}</span>`
  ).join(" ");
}

function selectedVariables() {
  return variables.filter(v => v.checked);
}

function timeRangeIndexes() {
  const start = parseTime(el("startTime").value) || table.times[0];
  const end = parseTime(el("endTime").value) || table.times[table.times.length - 1];
  let startIdx = 0;
  let endIdx = table.times.length - 1;
  while (startIdx < table.times.length && table.times[startIdx] < start) startIdx++;
  while (endIdx >= 0 && table.times[endIdx] > end) endIdx--;
  if (startIdx >= endIdx) return [0, table.times.length - 1];
  return [startIdx, endIdx];
}

function makeSeriesData(variable, startIdx, endIdx, step) {
  const data = [];
  for (let i = startIdx; i <= endIdx; i += step) {
    const y = parseNumber(table.rows[i][variable.idx]);
    if (!Number.isNaN(y)) data.push([formatTime(table.times[i]), y]);
  }
  return data;
}

function currentChartMode() {
  return el("chartType").value || "line";
}

function buildSeries(variable, index, startIdx, endIdx, step) {
  const mode = currentChartMode();
  const color = curveColors[index % curveColors.length];
  const base = {
    name: variable.name,
    yAxisIndex: Math.min(variable.axis, axisCount - 1),
    itemStyle: { color },
    data: makeSeriesData(variable, startIdx, endIdx, step)
  };

  if (mode === "scatter") {
    return {
      ...base,
      type: "scatter",
      symbolSize: 5,
      large: true,
      largeThreshold: 2000
    };
  }

  return {
    ...base,
    type: "line",
    showSymbol: mode === "line+points",
    symbol: "circle",
    symbolSize: mode === "line+points" ? 5 : 3,
    smooth: false,
    sampling: "lttb",
    lineStyle: { width: 1.4, color }
  };
}

function drawChart() {
  if (!table) return;
  const chosen = selectedVariables();
  if (!chosen.length) {
    alert("请至少选择一个指标列。");
    return;
  }
  showLoading("正在绘制曲线...");
  setTimeout(() => {
    const [startIdx, endIdx] = timeRangeIndexes();
    const total = endIdx - startIdx + 1;
    const limit = Number(el("sampleLimit").value);
    const step = limit > 0 ? Math.max(1, Math.floor(total / limit)) : 1;

    if (!chart) {
      chart = echarts.init(el("chart"), null, { renderer: "canvas" });
      window.addEventListener("resize", () => chart && chart.resize());
    }

    const yAxis = Array.from({ length: axisCount }, (_, i) => ({
      type: "value",
      name: `Y${i + 1}`,
      position: i % 2 === 0 ? "left" : "right",
      offset: Math.floor(i / 2) * 55,
      axisLine: { show: true, lineStyle: { color: axisColors[i] } },
      axisLabel: { color: axisColors[i] },
      splitLine: { show: i === 0 }
    }));

    const series = chosen.map((v, i) => buildSeries(v, i, startIdx, endIdx, step));

    chart.setOption({
      animation: false,
      color: curveColors,
      title: {
        text: `${formatTime(table.times[startIdx])} 至 ${formatTime(table.times[endIdx])}`,
        left: "center",
        top: 8,
        textStyle: { fontSize: 14 }
      },
      tooltip: { trigger: currentChartMode() === "scatter" ? "item" : "axis", axisPointer: { type: "cross" } },
      legend: { type: "scroll", top: 34, left: 20, right: 20 },
      grid: {
        top: 82,
        left: 70 + Math.max(0, Math.ceil(axisCount / 2) - 1) * 55,
        right: 70 + Math.max(0, Math.floor(axisCount / 2) - 1) * 55,
        bottom: 120,
        containLabel: true
      },
      toolbox: { right: 12, feature: { dataZoom: {}, restore: {}, saveAsImage: {} } },
      xAxis: {
        type: "time",
        axisLabel: { hideOverlap: true, margin: 14 },
        axisLine: { lineStyle: { color: "#94a3b8" } }
      },
      yAxis,
      dataZoom: [
        { type: "inside", xAxisIndex: 0, filterMode: "none" },
        {
          type: "slider",
          xAxisIndex: 0,
          filterMode: "none",
          height: 44,
          bottom: 18,
          borderColor: "#cbd5e1",
          backgroundColor: "#eef2f7",
          fillerColor: "rgba(15, 118, 110, 0.18)",
          showDetail: true,
          showDataShadow: true,
          brushSelect: false,
          handleSize: 18,
          handleStyle: {
            color: "#0f766e",
            borderColor: "#0b5f59",
            shadowBlur: 2,
            shadowColor: "rgba(15, 118, 110, 0.28)"
          },
          moveHandleSize: 8,
          moveHandleStyle: {
            color: "#94a3b8",
            opacity: 0.85
          },
          textStyle: {
            color: "#475467"
          },
          dataBackground: {
            lineStyle: { color: "#64748b", width: 1 },
            areaStyle: { color: "rgba(148, 163, 184, 0.25)" }
          },
          selectedDataBackground: {
            lineStyle: { color: "#0f766e", width: 1.2 },
            areaStyle: { color: "rgba(15, 118, 110, 0.14)" }
          }
        }
      ],
      series
    }, true);
    el("emptyState").style.display = "none";
    el("fileInfo").textContent = `${table.fileName} | 当前 ${total.toLocaleString()} 行 | 抽样步长 ${step} | ${chosen.length} 条曲线`;
    hideLoading();
  }, 20);
}

el("openBtn").addEventListener("click", () => el("fileInput").click());
el("fileInput").addEventListener("change", async event => {
  const file = event.target.files[0];
  if (!file) return;
  try {
    await loadFile(file);
    hideLoading();
  } catch (error) {
    hideLoading();
    el("fileInfo").innerHTML = `<span class="warn">加载失败：${escapeHtml(error.message)}</span>`;
    alert("加载失败：" + error.message);
  }
});

el("timeColumn").addEventListener("change", () => {
  if (!table) return;
  table.timeIdx = Number(el("timeColumn").value);
  const newTimes = [];
  const newRows = [];
  for (const row of table.rows) {
    const t = parseTime(row[table.timeIdx]);
    if (!t) continue;
    newTimes.push(t);
    newRows.push(row);
  }
  table.times = newTimes;
  table.rows = newRows;
  buildVariables();
  setInitialTimeRange();
});

el("varList").addEventListener("change", event => {
  const item = event.target.closest(".var-item");
  if (!item) return;
  const variable = variables[Number(item.dataset.index)];
  if (event.target.dataset.role === "check") variable.checked = event.target.checked;
  if (event.target.dataset.role === "axis") variable.axis = Number(event.target.value);
});

el("searchBox").addEventListener("input", renderVariables);
el("drawBtn").addEventListener("click", drawChart);
el("chartType").addEventListener("change", () => {
  if (selectedVariables().length) drawChart();
});
el("saveBtn").addEventListener("click", () => {
  if (!chart) return;
  const url = chart.getDataURL({ type: "png", pixelRatio: 2, backgroundColor: "#ffffff" });
  const a = document.createElement("a");
  a.href = url;
  a.download = "csv_chart.png";
  a.click();
});

el("selectVisible").addEventListener("click", () => {
  visibleVariableIndexes().forEach(i => variables[i].checked = true);
  renderVariables();
});
el("invertVisible").addEventListener("click", () => {
  visibleVariableIndexes().forEach(i => variables[i].checked = !variables[i].checked);
  renderVariables();
});
el("clearAll").addEventListener("click", () => {
  variables.forEach(v => v.checked = false);
  renderVariables();
});
el("addAxis").addEventListener("click", () => {
  axisCount = Math.min(6, axisCount + 1);
  renderVariables();
});
el("removeAxis").addEventListener("click", () => {
  axisCount = Math.max(1, axisCount - 1);
  variables.forEach(v => v.axis = Math.min(v.axis, axisCount - 1));
  renderVariables();
});
</script>
</body>
</html>
